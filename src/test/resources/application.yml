spring:
  flyway:
    enabled: false # @DataJpaTest는 H2를 쓰는데, 마이그레이션 SQL이 PostgreSQL 문법(BIGSERIAL 등)이라 비활성화
  jpa:
    hibernate:
      ddl-auto: create-drop # 테스트 시점에는 엔티티 기준으로 스키마 자동 생성
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      timeout: 2000ms
      connect-timeout: 2000ms

auth-server:
  issuer: http://localhost:9000
  token:
    access-token-ttl-minutes: 30
    id-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
  security:
    login-fail-lock-threshold: 5
    login-fail-window-hours: 1
    require-https: false
  rate-limit:
    capacity: 10
    refill-tokens-per-minute: 10
  signing-key:
    source: in-memory
    encryption-key:
