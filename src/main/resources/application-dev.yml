spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

management:
  tracing:
    sampling:
      probability: 1.0 # 개발 환경 100% 샘플링

auth-server:
  signing-key:
    source: in-memory

logging:
  level:
    com.haenaryn.authserver: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
