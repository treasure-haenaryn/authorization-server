spring:
  application:
    name: authorization-server

  # Virtual Thread 활성화 (api-gateway와 동일 전략)
  threads:
    virtual:
      enabled: true

  # DataSource
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: 0 # DB 연결 실패 시 앱 기동 실패 방지 (0 = 대기)
      connection-timeout: 30000
      validation-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate # 스키마는 Flyway가 관리, JPA는 검증만
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Redis (refresh token 캐시, 블랙리스트, 로그인 실패 카운트, 인가 코드)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms

server:
  port: ${SERVER_PORT}

# Actuator + Prometheus + OpenTelemetry
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - prometheus
          - metrics
          - flyway
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true # /actuator/health/liveness, /actuator/health/readiness 노출
      group:
        readiness:
          # Redis(rateLimitRedis 포함)는 의도적으로 포함하지 않음
          include: readinessState,db
    flyway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  opentelemetry:
    resource-attributes:
      service.name: authorization-server
  otlp:
    metrics:
      export:
        url: ${OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        enabled: ${OTLP_ENABLED:false}
    tracing:
      export:
        otlp:
          endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces

# Authorization Server 커스텀 설정
auth-server:
  issuer: ${AUTH_SERVER_ISSUER:http://localhost:9000}
  token:
    access-token-ttl-minutes: 30
    id-token-ttl-minutes: 30
    refresh-token-ttl-days: 7
  security:
    login-fail-lock-threshold: 5
    login-fail-window-hours: 1
    require-https: false # prod에서만 true로 오버라이드 (application-prod.yml)
  rate-limit:
    capacity: 10 # 버킷 최대 용량 (순간 버스트 허용량)
    refill-tokens-per-minute: 10 # 분당 리필 토큰 수 (평균 처리율)
  signing-key:
    source: ${SIGNING_KEY_SOURCE:in-memory}
    encryption-key: ${ENCRYPTION_KEY:} # source=database일 때만 사용, Base64 인코딩된 AES-256 키(32바이트)
    rotation-interval-days: 90 # ACTIVE 키가 이 기간을 넘기면 스케줄러가 자동 로테이션
    grace-period-minutes: 60 # RETIRING 키가 검증(JWKS 노출)용으로 남는 기간. access/id token TTL(30분)보다 여유 있게
    cache-ttl-seconds: 30 # 서명/검증 키 소스가 DB를 다시 조회하기까지의 캐시 유효시간 (로테이션 전파 지연 시간)
  retention:
    purge-cron: "0 0 4 * * *" # 매일 04:00 pg_partman run_maintenance_proc 호출
